verdict: >-
  Sur cinq critères, Quitoque en remporte quatre et fait jeu égal sur la variété de la carte.
  Pour cuisiner frais, local et de saison sans contrainte, Quitoque est notre choix. HelloFresh
  reste une excellente porte d'entrée si votre priorité absolue est le prix d'appel et un catalogue
  géant pour débuter.
