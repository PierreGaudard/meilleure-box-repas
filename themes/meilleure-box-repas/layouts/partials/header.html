<header class="site-header" id="top">
    <div class="header-container">
        <a href="{{ "/" | relURL }}" class="brand">
            <img src="{{ "/logo-full.webp" | relURL }}" alt="Meilleure Box Repas" width="180" height="85" decoding="async">
        </a>
        <button class="burger" aria-label="Menu" onclick="document.getElementById('top').classList.toggle('open')">&#9776;</button>
        <nav class="site-nav" role="navigation">
            <a href="{{ "/comparatif/" | relURL }}"{{ if eq .RelPermalink "/comparatif/" }} class="active"{{ end }}>Comparatif</a>
            <a href="{{ "/avis/" | relURL }}"{{ if eq .RelPermalink "/avis/" }} class="active"{{ end }}>Avis</a>
            <a href="{{ "/guides/" | relURL }}"{{ if eq .Section "guides" }} class="active"{{ end }}>Guides</a>
            <a href="{{ "/alternatives/" | relURL }}"{{ if eq .RelPermalink "/alternatives/" }} class="active"{{ end }}>Alternatives</a>
        </nav>
        <a href="{{ "/meilleure-box-repas/" | relURL }}" class="cta">🧺 Comparateur</a>
<div class="langsw" style="position:relative;margin-left:12px"><button type="button" aria-label="Language" onclick="var m=this.nextElementSibling;m.style.display=m.style.display==='block'?'none':'block'" style="background:rgba(255,255,255,.18);border:none;border-radius:50px;padding:.5rem 1rem;cursor:pointer;font-size:1.6rem;line-height:1">🇫🇷 ▾</button><div style="display:none;position:absolute;right:0;top:115%;background:#fff;border-radius:10px;box-shadow:0 6px 18px rgba(0,0,0,.18);padding:4px;z-index:80"><a href="{{ .Params.en_url | default "/en/" }}" hreflang="en" aria-label="English" style="display:block;padding:.5rem .8rem;font-size:1.6rem;text-decoration:none">🇬🇧</a></div></div>
    </div>
</header>
